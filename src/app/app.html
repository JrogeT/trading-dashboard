<mat-toolbar color="primary" class="app-toolbar">
  <mat-icon>candlestick_chart</mat-icon>
  <span class="app-title">Crypto Trading Signals</span>
</mat-toolbar>

<nav mat-tab-nav-bar [tabPanel]="tabPanel" class="nav-tabs">
  <a mat-tab-link routerLink="/" routerLinkActive #rla1="routerLinkActive" [active]="rla1.isActive" [routerLinkActiveOptions]="{ exact: true }">
    <mat-icon>dashboard</mat-icon>
    All Signals
  </a>
  <a mat-tab-link routerLink="/active" routerLinkActive #rla2="routerLinkActive" [active]="rla2.isActive">
    <mat-icon>flash_on</mat-icon>
    Active Trades
  </a>
</nav>

<mat-tab-nav-panel #tabPanel>
  <router-outlet />
</mat-tab-nav-panel>
